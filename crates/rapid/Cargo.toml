[package]
name = "rapid"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tokio = { version = "1.45.1", features = ["macros", "rt-multi-thread"], default-features = false }
async-trait = "0.1.73"
futures = "0.3.28"

dashmap = "6.0.0"
lazy_static = "1.4.0"
once_cell = "1.18.0"

chrono = "0.4.26"
rand = "0.8.5"
ulid = "1.0.0"

env_logger = "0.11.0"
log = "0.4.20"

async-tungstenite = { version = "0.30.0", features = ["tokio-runtime"] }

serde = { version = "1.0.183", features = ["derive"] }
rmp-serde = "1.1.2"
typetag = "0.2.18"
rmpv = { git = "https://github.com/infiniwave/msgpack-rust.git", features = ["with-serde"] }
x25519-dalek = "2.0.0"
uuid = "1.17.0"
